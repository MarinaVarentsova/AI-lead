openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for AI Квалификатор ИНОБР
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: diagnostic
    description: Diagnostic session operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /diagnostic-sessions:
    post:
      operationId: createDiagnosticSession
      tags: [diagnostic]
      summary: Save diagnostic session answers
      description: Saves the user's answers from the 4-question diagnostic flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiagnosticSessionInput"
      responses:
        "201":
          description: Session saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticSession"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      operationId: listDiagnosticSessions
      tags: [diagnostic]
      summary: List all diagnostic sessions
      description: Returns all saved diagnostic sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiagnosticSession"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DiagnosticSessionInput:
      type: object
      required:
        - question1
        - question2
        - question3
        - question4
      properties:
        question1:
          type: string
          description: "Answer to question 1: background/experience area"
        question2:
          type: string
          description: "Answer to question 2: years of work experience"
        question3:
          type: string
          description: "Answer to question 3: education level"
        question4:
          type: string
          description: "Answer to question 4: learning goal"

    DiagnosticSession:
      type: object
      required:
        - id
        - createdAt
        - question1
        - question2
        - question3
        - question4
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
        question1:
          type: string
        question2:
          type: string
        question3:
          type: string
        question4:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
